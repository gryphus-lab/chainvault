name: CI workflow with SonarQube

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  LEPTONICA_VERSION: "1.86.0"
  LEPTONICA_URL: "https://github.com/DanBloomberg/leptonica/releases/download/${{ env.LEPTONICA_VERSION }}/leptonica-${{ env.LEPTONICA_VERSION }}.tar.gz"
  TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata
  LD_LIBRARY_PATH: /usr/local/lib:$LD_LIBRARY_PATH
  JNA_LIBRARY_PATH: /usr/local/lib
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          version: 2026.3.8
          install: true
          cache: true

      - name: Restore Leptonica Cache
        id: cache-leptonica
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/liblept*
          key: leptonica-${{ env.LEPTONICA_VERSION }}

      - name: Install Dependencies & Build Leptonica
        if: steps.cache-leptonica.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng \
            libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev libopenjp2-7-dev libgif-dev \
            autoconf automake libtool pkg-config
          
          curl --proto "=https" --tlsv1.2 -sSfLO ${{ env.LEPTONICA_URL }}
          tar -xf leptonica-${{ env.LEPTONICA_VERSION }}.tar.gz
          cd leptonica-${{ env.LEPTONICA_VERSION }}
          ./autogen.sh && ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig /usr/local/lib

      - name: Fix Runtime Deps (if cache hit)
        if: steps.cache-leptonica.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y libtesseract-dev tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng
          sudo ldconfig /usr/local/lib

      - name: Cache Maven/Sonar
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.sonar/cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build

      - name: Build and Analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mise set TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
          mise run github-build
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
