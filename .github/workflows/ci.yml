name: CI workflow with SonarQube

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  LEPTONICA_VERSION: "1.86.0"
  TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata
  LD_LIBRARY_PATH: /usr/local/lib:$LD_LIBRARY_PATH
  JNA_LIBRARY_PATH: /usr/local/lib
  TESTCONTAINERS_RYUK_DISABLED: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # required for actions using Node.js 20
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Install Dependencies & Build Leptonica
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng \
            libpng-dev libjpeg-dev libtiff-dev zlib1g-dev libwebp-dev libopenjp2-7-dev libgif-dev \
            autoconf automake libtool pkg-config
          
          curl --proto "=https" --tlsv1.2 -sSfLO "https://github.com/DanBloomberg/leptonica/releases/download/${{ env.LEPTONICA_VERSION }}/leptonica-${{ env.LEPTONICA_VERSION }}.tar.gz"

          tar -xf leptonica-${{ env.LEPTONICA_VERSION }}.tar.gz
          cd leptonica-${{ env.LEPTONICA_VERSION }}
          ./autogen.sh && ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig /usr/local/lib

      - name: Cache maven/sonar packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.sonar/cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache yarn packages
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Run formatting checks
        run: mise run check

      - name: Build and Verify
        run: |
          mise set TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
          mise run github-build

      - name: Publish Test Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: '**/target/surefire-reports/*.xml'
          pull-request-report: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": false,
                  "env": {
                    "appName": "my-app"
                  }
                }
              }
            }
        if: always()

      - name: Run Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar