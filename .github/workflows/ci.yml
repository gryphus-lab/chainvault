name: CI workflow with SonarQube

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise (Java 25 + Maven from mise.toml)
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.8
          install: true
          cache: true
          cache_key_prefix: mise-v1

      - name: Verify mise tools
        run: mise doctor && mise ls --current

      - name: Setup Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libtesseract-dev \
            tesseract-ocr \
            tesseract-ocr-deu \
            tesseract-ocr-eng

      - name: Install Leptonica Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libjpeg-dev libtiff-dev zlib1g-dev \
                              libwebp-dev libopenjp2-7-dev libgif-dev \
                              autoconf automake libtool pkg-config

      - name: Build Leptonica 1.86.0 from Source
        run: |
          wget https://github.com/user-attachments/files/22412990/leptonica-1.86.0.tar.gz
          tar -xf 1.86.0.tar.gz
          cd leptonica-1.86.0
          ./autogen.sh
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig /usr/local/lib

      - name: Set Environment Variables for Java
        run: |
          echo "LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "JNA_LIBRARY_PATH=/usr/local/lib" >> $GITHUB_ENV

      - name: Verify Leptonica Version
        run: |
          ldd /usr/local/lib/libleptonica.so | grep "not found" || echo "Linker OK"
          pkg-config --modversion lept

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and verify
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

        run: |
          mise set TESSDATA_PREFIX=/usr/share/tesseract-ocr/5/tessdata
          mise run github-build

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar