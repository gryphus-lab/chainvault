# chainvault-dashboard/sonar-project.properties

sonar.projectKey=gryphus-lab_chainvault
sonar.organization=gryphus-lab
sonar.projectVersion=1.0.0-SNAPSHOT

# Source and test paths
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Explicitly tell SonarQube to use TypeScript analyzer only
sonar.language=ts

# Disable JavaScript analyzer for this module
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.file.suffixes=.js,.jsx   # optional, but safe

# Coverage (if using Vitest + coverage)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,build/**,.yarn/**

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.json