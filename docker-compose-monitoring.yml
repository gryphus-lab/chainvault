# docker-compose-monitoring.yml for observability
services:
  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
      - ./logs:/var/log/chainvault:ro           # mount your JSON log directory
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "12345:12345"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./env/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      # increases the log level from info to debug
      - GF_LOG_LEVEL=debug
    ports:
      - '3000:3000'
    volumes:
      - 'grafana_storage:/var/lib/grafana'

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-blocks:/tmp/tempo/blocks
      - tempo-wal:/tmp/tempo/wal
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    user: "0:0"  # ← run as root (quick fix for local dev)
    # Alternative (better security): keep default user but chown the volumes
    # user: "10001:10001"  # Tempo default user
    restart: unless-stopped

volumes:
  grafana_storage: { }
  tempo-blocks:
  tempo-wal: