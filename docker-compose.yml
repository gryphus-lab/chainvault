# docker-compose.yml for chainvault
services:
  chainvault-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gryphus-lab/chainvault:latest
    ports:
      - "8085:8085"
    volumes:
      - ./logs:/app/logs
    environment:
      # Java options
      _JAVA_OPTIONS: "-Xmx2g -XX:+UseZGC -Djdk.virtualThreadScheduler.parallelism=auto"
      SPRING_PROFILES_ACTIVE: default
      # SFTP (from sftp-test)
      target.sftp.host: sftp-test
      target.sftp.port: 22
      target.sftp.username: testuser
      target.sftp.password: testpass123
      target.sftp.remote-directory: /upload
      target.sftp.allow-unknown-keys: "true"
      # Source API (from fake-api)
      source.api.base-url: http://fake-source-api:9091
      source.api.token: dummy
      # PostgreSQL
      spring.datasource.url: jdbc:postgresql://postgres:5432/chainvault
      spring.datasource.username: chainvault
      spring.datasource.password: secret
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      # Tesseract
      TESSDATA_PREFIX: /usr/share/tesseract-ocr/5/tessdata
    depends_on:
      sftp-test:
        condition: service_healthy
      fake-source-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: chainvault
      POSTGRES_USER: chainvault
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-resources/db/init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainvault -d chainvault"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  sftp-test:
    image: atmoz/sftp:latest
    ports:
      - "127.0.0.1:2222:22"
    command: testuser:testpass123:::upload
    healthcheck:
      test: ["CMD", "ls", "/home/testuser/upload"]
      interval: 5s
      start_period: 5s
    restart: unless-stopped

  fake-source-api:
    image: node:25-alpine
    working_dir: /app
    ports:
      - "9091:9091"
    volumes:
      - ./docker-resources/json-server/init-scripts/setup.sh:/app/setup.sh
      - ./docker-resources/json-server/init-scripts/create_source_data.py:/data/create_source_data.py
    entrypoint: sh -c "chmod +x /app/setup.sh && /app/setup.sh"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091"]
      interval: 20s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
