# docker-compose.yml for chainvault
services:

  chainvault-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gryphus-lab/chainvault:latest
    ports:
      - "8085:8085"
    volumes:
      - ./logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: default
      # SFTP (from sftp-test)
      target.sftp.host: sftp-test
      target.sftp.port: 22
      target.sftp.username: testuser
      target.sftp.password: testpass123
      target.sftp.remote-directory: /upload
      target.sftp.allow-unknown-keys: "true"
      # Source API (from fake-api)
      source.api.base-url: http://fake-source-api:9091
      source.api.token: dummy
      # PostgreSQL
      spring.datasource.url: jdbc:postgresql://postgres:5432/chainvault
      spring.datasource.username: chainvault
      spring.datasource.password: secret
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    depends_on:
      sftp-test:
        condition: service_healthy
      fake-source-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/actuator/health" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chainvault
      POSTGRES_USER: chainvault
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/db/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chainvault" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sftp-test:
    image: atmoz/sftp:latest
    ports:
      - "22"
    volumes:
      - ./data/upload:/home/testuser/upload
    command: testuser:testpass123:::upload
    healthcheck:
      test: [ "CMD", "ls", "/home/testuser/upload" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fake-source-api:
    image: node:25-alpine
    working_dir: /app
    ports:
      - "9091:9091"
    volumes:
      - ./src/main/resources/json-server/scripts/setup.sh:/app/setup.sh
      - ./src/main/resources/json-server/scripts/create_source_data.py:/data/create_source_data.py
    entrypoint: sh -c "chmod +x /app/setup.sh && /app/setup.sh"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9091 || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  sftp-data: