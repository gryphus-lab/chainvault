global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'chainvault-app'
    scrape_interval: 5s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['chainvault-app:8085']

  - job_name: 'tempo'
    static_configs:
      - targets:
          - 'localhost:3200'

  - job_name: 'alloy'
    static_configs:
      - targets:
          - 'alloy:12345'