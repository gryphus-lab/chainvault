# mise.toml
[tools]
java = "temurin-25"
maven = "3.9"
python = "3.14"
docker-slim = "latest"
node = "24"
yarn = "4.13.0"
jq = "latest"
uv = "latest"
trivy = "latest"

# ────────────────────────────────────────
# Environment (activated repo-wide)
# ────────────────────────────────────────

[env]
# Leverage Java 25 features (e.g., generous defaults for virtual threads)
_JAVA_OPTIONS = "-Xmx2048m -XX:+UseZGC -Djdk.virtualThreadScheduler.parallelism=auto"
MAVEN_OPTS = "-Xmx1024m"

# Install seed packages (pip, setuptools, and wheel) into the virtual environment.
_.python.venv = { path = ".venv", create = true, uv_create_args = ["--seed"] }
UV_PROJECT_ENVIRONMENT = ".venv"
MISE_PYTHON_DEFAULT_PACKAGES_FILE = "./default-python-packages"

# Spring Boot 4 common defaults
SPRING_PROFILES_ACTIVE = "local"

# Tesseract test data
TESSDATA_PREFIX = "/opt/homebrew/share/tessdata"

[settings]
python.default_packages_file = "./default-python-packages"

# ────────────────────────────────────────
# Tasks (run from anywhere — mise uses root config)
# ────────────────────────────────────────

[tasks]
bootstrap = { run = "mvn dependency:go-offline", description = "One-time setup after clone / clean machine" }

build = { run = "mvn clean install -DskipTests", description = "Clean + install all modules (no tests)" }

verify = { run = [
  "docker compose -p chainvault down",
  "mvn clean verify -Pcoverage",
], description = "Full build + tests + verifications + JaCoCo coverage" }

test = { run = "mvn integration-test", description = "Run unit and integration Tests" }

test-docker = { run = "mvn failsafe:integration-test -Dtest=Docker*", description = "Run integration Tests - Docker only" }

dev = { run = [
  "docker compose up -d postgres",
  "sleep 5",
  "docker compose exec -T postgres pg_isready -U postgres -t 30 || exit 1",
  "cd chainvault-orchestration && mvn spring-boot:run -am -Dspring.profiles.active=local",
], description = "Run Dev" }

package = { run = "mvn clean package -DskipTests -am", description = "Package the executable JAR" }

site = { run = [
  "mvn clean install -DskipTests",
  "mvn site site:stage",
], description = "Generate Maven Javadocs & Site" }

ci = { run = [
  "mvn clean verify",
  "docker compose up -d postgres",
  "sleep 5",
  "docker compose exec -T postgres pg_isready -U postgres -t 30 || exit 1",
  "java -jar chainvault-orchestration/target/*.jar --spring.profiles.active=local",
], description = "Full CI-style checks" }

github-build = { run = "mvn clean install -Pcoverage", description = "GitHub CI Build (used by .github/workflows/ci.yml)" }

docker-build = { run = "docker build --no-cache -t gryphus-lab/chainvault:latest -f Dockerfile .", description = "Docker build" }

docker-build-versioned = { run = '''
  VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl api -am -N)
  docker build -t gryphus-lab/chainvault:$VERSION -t gryphus-lab/chainvault:latest -f ./Dockerfile .
''', description = "Versioned Docker build + tag from POM (multi-module aware)" }

# docker-compose
compose-up = { run = "docker compose -f ./docker-compose-lgtm.yml -f ./docker-compose.yml up -d", description = "Docker compose up - all services" }
compose-down = { run = "docker compose -p chainvault down", description = "Docker compose down - all services" }
compose-down-full = { run = "docker compose -p chainvault down -v", description = "Docker compose down - all services and volumes" }

# run smoke test
smoke-test = { run = "./start_test.sh", description = "Run smoke test" }

# run load test
load-test = { run = "./start_test.sh -i 1000", description = "Run load test with 1000 iterations" }

# Dependency
deps = { run = "mvn dependency:tree", description = "Generate maven dependency tree" }

# Formatting / linting (spotless, etc.)
check = { run = [
  "yarn lint:admin-ui",
  "yarn prettier-check:admin-ui",
  "mvn spotless:check",
], description = "Check using yarn lint/prettier and spotless-maven-plugin" }

format = { run = [
  "yarn lint-fix:admin-ui",
  "yarn prettier:admin-ui",
  "mvn spotless:apply",
], description = "Format using yarn lint/prettier spotless-maven-plugin" }

