# mise.toml
[tools]
java = "temurin-25"
maven = "3.9"
python = "3.12"
"aqua:astral-sh/uv" = "latest" # uv is blazing fast for venv + pip installs

# ────────────────────────────────────────
# Environment (activated repo-wide)
# ────────────────────────────────────────

[env]
# Leverage Java 25 features (e.g., generous defaults for virtual threads)
_JAVA_OPTIONS = "-Xmx2048m -XX:+UseZGC -Djdk.virtualThreadScheduler.parallelism=auto"
MAVEN_OPTS = "-Xmx1024m"

# mise auto-creates .venv when you enter the directory (recommended!)
_.python.venv = { path = ".venv", create = true }
UV_PROJECT_ENVIRONMENT = ".venv"

# Spring Boot 4 common defaults
SPRING_PROFILES_ACTIVE = "local"

# ────────────────────────────────────────
# Tasks (run from anywhere — mise uses root config)
# ────────────────────────────────────────

[tasks]
bootstrap = { run = "mvn dependency:go-offline", description = "One-time setup after clone / clean machine" }

build = { run = "mvn clean install -DskipTests", description = "Clean + install all modules (no tests)" }

verify = { run = "mvn clean verify -Pcoverage", description = "Full build + tests + verifications + JaCoCo coverage" }

test = { run = "mvn integration-test", description = "Run unit and integration Tests" }

test-docker = { run = "mvn failsafe:integration-test -Dtest=Docker*", description = "Run integration Tests - Docker only" }

dev = { run = [
  "docker compose up -d postgres",
  "sleep 5",
  "docker compose exec -T postgres pg_isready -U postgres -t 30 || exit 1",
  "cd chainvault-orchestration && mvn spring-boot:run -am -Dspring.profiles.active=local",
], description = "Run Dev" }

package = { run = "mvn clean package -DskipTests -am", description = "Package the executable JAR" }

ci = { run = [
  "mvn clean verify",
  "docker compose up -d postgres",
  "sleep 5",
  "docker compose exec -T postgres pg_isready -U postgres -t 30 || exit 1",
  "java -jar chainvault-orchestration/target/*.jar --spring.profiles.active=local",
], description = "Full CI-style checkw" }

docker-build = { run = "docker build -t gryphus-lab/chainvault:latest -f Dockerfile .", description = "Docker build" }

docker-build-versioned = { run = '''
  VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl api -am -N)
  docker build -t gryphus-lab/chainvault:$VERSION -t gryphus-lab/chainvault:latest -f ./Dockerfile .
''', description = "Versioned Docker build + tag from POM (multi-module aware)" }

# docker-compose
compose-up = { run = "docker compose -f ./docker-compose-lgtm.yml -f ./docker-compose.yml up -d", description = "Docker compose zp - all services" }
compose-down = { run = "docker compose -p chainvault down -v", description = "Docker compose down - all services" }

# run load test
run-load = { run = "./start_test.sh", description = "Run load test"}

# Dependency
deps = { run = "mvn dependency:tree", description = "Generate maven dependency tree" }

# Formatting / linting (spotless, etc.)
fmt = { run = "mvn spotless:apply", description = "Format using spotless-maven-plugin" }
check = { run = "mvn spotless:check", description = "Check using spotless-maven-plugin" }
