# sonar-project.properties

sonar.projectKey=gryphus-lab_chainvault
sonar.organization=gryphus-lab
sonar.projectVersion=1.0.0-SNAPSHOT

# ======================
# Source code paths
# ======================
sonar.sources=chainvault-orchestration/src/main/java,chainvault-migration/src/main/java
sonar.tests=chainvault-orchestration/src/test/java,chainvault-migration/src/test/java

# ======================
# Exclusions
# ======================
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,chainvault-dashboard/.yarn/**

# ======================
# Java + Frontend analysis
# ======================
sonar.java.binaries=chainvault-orchestration/target/classes,chainvault-migration/target/classes

# Disable JS analyzer for React/TypeScript files
sonar.javascript.file.suffixes=.js,.mjs,.cjs
sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts