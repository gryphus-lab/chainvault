# sonar-project.properties

sonar.projectKey=gryphus-lab_chainvault
sonar.projectName=gryphus-lab
sonar.projectVersion=1.0.0-SNAPSHOT

# ======================
# Source code paths
# ======================
sonar.sources=chainvault-orchestration/src/main/java,chainvault-migration/src/main/java
sonar.tests=chainvault-orchestration/src/test/java,chainvault-migration/src/test/java,chainvault-dashboard/src

# TypeScript/React source
sonar.sourceEncoding=UTF-8
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.typescript.tsconfigPath=chainvault-dashboard/tsconfig.json

# ======================
# Exclusions
# ======================
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,chainvault-dashboard/.yarn/**

# ======================
# Java + Frontend analysis
# ======================
sonar.java.binaries=chainvault-orchestration/target/classes,chainvault-migration/target/classes

# Enable TypeScript analysis
sonar.typescript.tsconfigPath=chainvault-dashboard/tsconfig.json

# Coverage (if you have tests)
# sonar.javascript.lcov.reportPaths=chainvault-dashboard/coverage/lcov.info